<!doctype html>
<html lang="fr-CA">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Commander une brochure gratuite</title>
        <link type="text/css" rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <header class="header">
            <p class="accroche">Publication gratuite</p>
            <h1 class="titre_principal">Commander une <span class="italique">brochure</span> gratuite</h1>
        </header>
        <main class="formulaire">
            <section class="section format">
                <h2 class="titre">
                    <img class="icon format" src="images/icon-format-brochure.svg" alt="">
                    <p class="text">Format de la brochure</p>
                </h2>
                <ul class="types_format">
                    <li class="type un"><img class="image type1" src="images/icon-file-print.svg" alt="">Imprimé</li>
                    <li class="type deux"><img class="image type2" src="images/icon-file-pdf.svg" alt="">PDF</li>
                    <li class="type trois"><img class="image type3" src="images/icon-file-epub.svg" alt="">ePub</li>
                </ul>
            </section>
            <section class="section info_contact">
                <h2 class="titre">
                    <img class="icon info_contact" src="images/icon-contact.svg" alt="">
                    <p class="text">Informations de contact</p>
                </h2>
                <form class="form">
                    <div class="row">
                        <p class="champ">
                            <label class="champ-text" for="prenom">Prénom</label>
                            <input type="text" name="prenom" id="prenom" />
                        </p>
                        <p class="champ">
                            <label class="champ-text" for="nom">Nom</label>
                            <input type="text" name="nom" id="nom" />
                        </p>
                    </div>
                    <p class="champ">
                        <label class="champ-text" for="email">Courriel <span class="description">(exemple@domaine.com)</span></label>
                        <input type="email" name="prenom" id="courriel" />
                    </p>
                    <p class="champ">
                        <label class="champ-text" for="phone">Téléphone <span class="description">(514 555 0123)</span></label>
                        <input type="tel" name="phone" id="telephone" />
                    </p>
                </form>
            </section>
            <section class="section info_postal">
                <h2 class="titre">
                    <img class="icon info_postal" src="images/icon-postal.svg" alt="">
                    <p class="text">Informations postal</p>
                </h2>
                <form class="form">
                    <p class="champ">
                        <label class="champ-text" for="adresse">Adresse <span class="description">(123, rue Principale)</span></label>
                        <input type="text" name="adresse" id="adresse" />
                    </p>
                    <div class="row">
                        <p class="champ choix">
                            <label class="champ-text" for="pet-select">Pays</label>
                            <select name="pays">
                                <optgroup label="sélectionner">
                                    <option value="Canada">Canada</option>
                                    <option value="États-Unis">USA</option>
                                </optgroup>
                            </select>
                        </p>
                        <p class="champ choix">
                            <label class="champ-text" for="pet-select">Province ou état</label>
                            <select name="province/état">
                                <optgroup label="Canada">
                                    <option value="AB">Alberta</option>
                                    <option value="BC">British Columbia</option>
                                    <option value="QC">Quebec</option>
                                </optgroup>
                                <optgroup label="États-Unis">
                                    <option value="CA">California</option>
                                    <option value="NY">New York</option>
                                </optgroup>
                            </select>
                        </p>
                    </div>
                    <p class="champ">
                        <label class="champ-text" for="code postal">Code postal <span class="description">(A1A 1A1)</span></label>
                        <input type="text" name="code postal" id="code postal" />
                    </p>
                </form>
                <section class="section case-a-cocher">
                    <input type="checkbox" id="infolettre" name="infolettre"/>
                    <label for="infolettre">Je désire recevoir des informations mensuelles par courriel sur les nouvelles publications et ressources disponibles.</label>
                </section>
                <button class="bouton" name="btnCommander" value="Commander">Commander <img class="bouton_img" src="images/icon-arrow.svg" alt="Commander" /></button>
        </main>

    </body>
</html>
