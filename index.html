<!doctype html>
<html lang="fr-CA">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Commander une brochure gratuite</title>
        <link type="text/css" rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <header class="header">
            <p class="accroche">Publication gratuite</p>
            <h1 class="titre_principal">Commander une <span class="italique">brochure</span> gratuite</h1>
        </header>
        <main class="formulaire">
            <section class="section format">
                <fieldset class="choix types_format">
                <legend class="titre">
                    <img class="icon format" src="images/icon-format-brochure.svg" alt="">
                    Format de brochure
                </legend>
                    <input
                    class="screen-reader-only" type="radio" name="format" id="format-pdf" />
                    <label for="format-pdf" class="radio-card"><img class="image" src="images/icon-file-pdf.svg">PDF</label>

                    <input
                    class="screen-reader-only" type="radio" name="format" id="format-epub" />
                    <label for="format-epub" class="radio-card"><img class="image" src="images/icon-file-epub.svg">EPUB</label>

                    <input
                    class="screen-reader-only" type="radio" name="format" id="format-imprime" />
                    <label for="format-imprime"  class="radio-card"><img class="image" src="images/icon-file-print.svg">Imprimé</label>

                </fieldset>
            </section>
            <section class="section info_contact">
                <fieldset class="choix">
                <legend class="titre">
                    <img class="icon format" src="images/icon-contact.svg" alt="">
                    Informations de contact
                </legend>
                    <form class="form">
                        <div class="row ctnValidation">
                            <p class="champ">
                                <label class="champ-text" for="prenom">Prénom</label>
                                <input type="text" name="prenom" id="prenom" required />
                                <p class="erreur"></p>
                            </p>
                            <p class="champ">
                                <label class="champ-text" for="nom">Nom</label>
                                <input type="text" name="nom" id="nom" required/>
                                <p class="erreur"></p>
                            </p>
                        </div>
                        
                        <div class="champ ctnValidation">
                            <label class="champ-text" for="courriel">Courriel <span class="description">(exemple@domaine.com)</span></label>
                            <input type="email" name="prenom" id="courriel" required/>
                            <p class="erreur"></p>
                        </div>
                        <div class="champ ctnValidation">
                            <label class="champ-text" for="telephone">Téléphone <span class="description">(514 555 0123)</span></label>
                            <input type="tel" name="phone" id="telephone" required/>
                            <p class="erreur"></p>
                        </div>
                    </form>
                </fieldset>
            </section>
            <section class="section info_postal">
                <fieldset class="choix">
                <legend class="titre">
                    <img class="icon format" src="images/icon-postal.svg" alt="">
                    Informations postales
                </legend>
                    <form class="form">
                    <div class="champ ctnValidation">
                        <label class="champ-text" for="adresse">Adresse <span class="description">(123, rue Principale)</span></label>
                        <input type="text" name="adresse" id="adresse" required/>
                        <p class="erreur"></p>
                    </div>
                    <div class="row ctnValidation">
                        <p class="champ choix">
                            <label class="champ-text" for="pays">Pays</label>
                            <select name="pays" id="pays">
                                <optgroup label="sélectionner">
                                    <option value="Canada">Canada</option>
                                    <option value="États-Unis">USA</option>
                                </optgroup>
                            </select>
                        </p>
                        <p class="champ choix">
                            <label class="champ-text" for="province">Province</label>
                            <select name="province/état" id="province">
                                <optgroup label="Canada">
                                    <option value="AB">Alberta</option>
                                    <option value="BC">British Columbia</option>
                                    <option value="QC">Quebec</option>
                                </optgroup>
                                <optgroup label="États-Unis">
                                    <option value="CA">California</option>
                                    <option value="NY">New York</option>
                                </optgroup>
                            </select>
                        </p>
                    </div>
                    <div class="champ">
                        <label class="champ-text" for="code-postal">Code postal <span class="description">(A1A 1A1)</span></label>
                        <input type="text" name="code-postal" id="code-postal" required/>
                    </div>
                    </form>
                </fieldset>
            </section>
                <section class="section case-a-cocher">
                    <input type="checkbox" id="infolettre" name="infolettre"/>
                    <label for="infolettre">Je désire recevoir des informations mensuelles par courriel sur les nouvelles publications et ressources disponibles.</label>
                </section>
                <button class="bouton" name="btnCommander" value="Commander">Commander <img class="bouton_img" src="images/icon-arrow.svg" alt="Commander" /></button>
        </main>

    </body>
</html>
